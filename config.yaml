x_api:
  provider: thirdparty
  bearer_token: ${X_BEARER_TOKEN}
  thirdparty:
    base_url: https://api.twitterapi.io
    api_key: ${THIRDPARTY_API_KEY}
searches:
- query: (strategy OR setup OR entry OR "take profit") ($BTC OR $ETH OR $SOL) -is:retweet
    lang:en
  label: crypto_strategy
- query: (airdrop OR mainnet OR testnet OR depin OR restaking) (web3 OR defi) -is:retweet
  label: web3_news
- query: (做多 OR 做空 OR 止损 OR 止盈 OR 入场) ($BTC OR $ETH OR $SOL) -is:retweet lang:zh
  label: crypto_strategy_zh
- query: (空投 OR 主网 OR 测试网 OR 质押 OR 链上) (web3 OR defi OR 去中心化) -is:retweet lang:zh
  label: web3_news_zh
fetch:
  max_per_account: 5
  max_per_search: 30
  lookback_hours: 72
  poll_interval_minutes: 60
classify:
  use_llm: false
  llm_model: claude-sonnet-4-6
storage:
  db_path: ./x_agent.db
digest:
  output_path: ./digest.md

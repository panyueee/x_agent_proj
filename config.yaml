  # tyc_id 优先；仅填 name 时会先搜索再取第一个匹配
  watch_companies:
    []   # 示例：- name: XX科技有限公司
         #        tyc_id: ""   # 填写后可跳过搜索步骤，更精准
  # 关键人员追踪（按姓名搜索其关联企业）
  watch_persons: []   # 如：- name: 曾毓群
  # A 股上市公司（走东方财富免费接口，无需 API key）
  listed_companies:
    - code: "300750"
      name: 宁德时代
    - code: "002594"
      name: 比亚迪
    - code: "688041"
      name: 海光信息
    - code: "600519"
      name: 贵州茅台

pipeline:
  enabled: true
  digest_path: ./output/pipeline_digest.md
  lookback_hours: 48        # 扫描最近多少小时的 X 推文找触发词
  learning:
    enabled: true
    min_score: 4            # 帖子最低得分才送 LLM 提取
    max_posts_per_run: 30   # 每轮最多处理多少条（控制 LLM 消耗）
    use_llm: true           # false 则只用正则轻量提取，不消耗 API
  # 自定义触发规则（覆盖 pipeline.py 内置规则）
  # 格式：chain 必须与 industry.chains[].name 一致
  extra_triggers:
    - chain: AI算力
      keywords:
        - Serenity
        - semiconductor
        - 算力爆发
        - AI基础设施
    - chain: 新能源汽车
      keywords:
        - 锂价
        - 电池降价
        - 新能源补贴

dune:
  enabled: false          # 设为 true 且配置 DUNE_API_KEY 后生效
  min_usd_smart_money: 500000   # 聪明钱过滤门槛（美元）
  min_usd_whale: 1000000        # 鲸鱼转账过滤门槛（美元）

weread:
  enabled: false          # 设为 true 并设置 WEREAD_COOKIE 后生效
  cookie: ${WEREAD_COOKIE}      # 浏览器 Cookie（登录 weread.qq.com 后复制）
  max_chapters: 999             # 每本书最多抓取章节数（-1 为全部）
  sleep_sec: 0.5                # 章节间休眠（秒），避免触发风控
  # 先运行 python -m x_agent.weread_fetcher shelf 查看书架和 book_id，再填到这里
  books: []
  # 示例：
  # books:
  #   - id: "CB_3w2f80f60f8aa0b0b"
  #     title: 投资中最简单的事
  #     author: 邱国鹭
  #   - id: "CB_915e4f607a4e4fa5d"
  #     title: 彼得·林奇的成功投资
  #     author: 彼得·林奇

rag:
  db_path: ${RAG_DB_PATH:-./output/rag.db}   # RAG 知识库路径
  chunk_size: 500               # 每块字符数
  chunk_overlap: 50             # 块间重叠字符数
  top_k: 6                      # 问答默认返回块数
  ingest_tweets: true           # --source rag 时是否入库推文/信号
  ingest_reports: true          # --source rag 时是否入库研报
  ingest_weread: true           # --source rag 时是否入库微信读书（需 weread.enabled: true）
  ingest_pdfs: true             # --source rag 时是否扫描 pdf_dirs 入库
  pdf_dirs:                     # PDF 书籍本地目录（支持多个）
    - ./books                   # 把 PDF 放这里即可自动入库
  pdf_recursive: false          # 是否递归扫描子目录

psych:
  enabled: true
  lookback_hours: 24      # 扫描近多少小时的入库推文
  use_llm: false          # true 时调 Claude 生成心理解读报告（需 ANTHROPIC_API_KEY）
  fear_threshold: 70      # Panic Index >= 此值时触发逆向买入预警
  greed_threshold: 30     # Panic Index <= 此值时触发逆向减仓预警

feishu:
  # 飞书 Bot 本地/远程地址，设置后 Panic Index 预警自动推送到飞书群
  # 留空则不推送（FEISHU_BOT_URL 环境变量同效）
  bot_url: ""             # 例：http://localhost:8002
  push_chat_id: ""        # 推送目标群 chat_id（同 FEISHU_PUSH_CHAT_ID）

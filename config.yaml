xhs:
  enabled: true
  max_per_search: 10
  max_per_account: 10
  searches:
    - query: BTC 交易策略
      label: xhs_btc_strategy
    - query: Web3 空投
      label: xhs_web3
    - query: 合约交易 止损
      label: xhs_contract
    - query: 量化交易 策略
      label: xhs_quant
    - query: A股 打板 龙头
      label: xhs_astock
  accounts: []   # 填入要监控的小红书用户名
tgb:
  enabled: true
  max_per_user: 10
  users:
    # 格式：id 为淘股吧用户数字 ID（URL /blog/<id> 中的数字），name 为昵称（仅供备注）
    - id: "11056656"
      name: 米开朗基瑞
